<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/Turn_Em_Logo.jpg" />
    <link rel="apple-touch-icon" href="/Turn_Em_Logo.jpg" />
    <link rel="manifest" href="/manifest.json" id="manifest-link" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <script>
      if (new URLSearchParams(window.location.search).get('mode') === 'staff') {
        document.getElementById('manifest-link').href = '/manifest-staff.json';
        document.getElementById('theme-color-meta').content = '#6366f1';
        document.getElementById('app-title-meta').content = 'TurnEM Staff';
        document.title = 'TurnEM - Staff Portal';
      }
    </script>
    <title>TurnEM - Aqua Team</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
